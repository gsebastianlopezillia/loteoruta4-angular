name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Add .nojekyll
        run: touch dist/loteo-ruta4/browser/.nojekyll

      - name: Verify build output
        run: |
          echo "=== Build directory contents ==="
          ls -la dist/loteo-ruta4/browser/ | head -25
          test -f dist/loteo-ruta4/browser/.nojekyll && echo "✓ .nojekyll exists" || echo "✗ .nojekyll missing"
          test -f dist/loteo-ruta4/browser/index.html && echo "✓ index.html exists" || echo "✗ index.html missing"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/loteo-ruta4/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
